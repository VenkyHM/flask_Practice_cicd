name: Flask CI/CD Pipeline

on:
  push:
    branches:
      - main
      - staging

permissions:
  contents: read

jobs:

# ================= CI =================
  ci:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:6
        ports:
          - 27017:27017

    env:
      MONGO_URI: mongodb://localhost:27017/testdb

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pylint bandit

      - name: Code Quality Checks
        run: |
          pylint app.py || true
          bandit -r . -s B104,B101

      - name: Run Tests
        run: pytest -v


# ================= STAGING DEPLOY =================
  deploy-staging:
    needs: ci
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Deploy to EC2 (Staging)
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
          "MONGO_URI='${MONGO_URI}' bash -s" << 'EOF'

          set -e
          APP_DIR="/home/ubuntu/flask-app"

          echo "🚀 Staging Deployment Started"

          # Clone or update repo
          if [ -d "$APP_DIR/.git" ]; then
            cd $APP_DIR
            git fetch origin
            git reset --hard origin/staging
          else
            git clone -b staging https://github.com/YOUR-USERNAME/YOUR-REPO.git $APP_DIR
            cd $APP_DIR
          fi

          # Create environment file
          echo "MONGO_URI=$MONGO_URI" > .env

          # Setup virtual environment
          python3 -m venv venv
          source venv/bin/activate

          pip install --upgrade pip
          pip install -r requirements.txt
          pip install gunicorn

          # Restart services
          sudo systemctl daemon-reload
          sudo systemctl restart flask-app
          sudo systemctl restart nginx

          echo "✅ Staging Deployment Successful"
          EOF